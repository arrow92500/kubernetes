project: default
source:
  repoURL: https://github.com/arrow92500/kubernetes.git
  path: ./petclinic
  targetRevision: HEAD
  helm:
    parameters:
      - name: app.contextPath
        value: /tp9
destination:
  server: https://kubernetes.default.svc
  namespace: tp9-argocd
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - CreateNamespace=true
